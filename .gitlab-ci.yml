sonarqube-check:
  image: mcr.microsoft.com/dotnet/sdk:latest
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script: 
    - dotnet tool install --global dotnet-sonarscanner
    - export PATH="$PATH:$HOME/.dotnet/tools"
    - dotnet sonarscanner begin /k:"ToDo" /o:"alexandermn" /d:sonar.token="$SONAR_TOKEN"
    - dotnet build
    - dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
  allow_failure: false
  # Запускать для всего, кроме тегов
  except:
    - tags
  # Или еще проще - вообще убрать only/rules, тогда будет запускаться для всего
  # (закомментируйте или удалите секции only/rules)
